name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            cargo-lambda-flags: "--arm64"
          - arch: x86_64
            cargo-lambda-flags: ""
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2.2.1
        with:
          version: 0.13.0

      - name: Install cargo-lambda
        uses: zerj9/setup-cargo-lambda@0e3fc757cbb70387ecba326fd28ab729c2a5ce7a # v0.1.2

      - name: Cache dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Build extension
        run: cargo lambda build --release -p lambda-otel-relay --extension ${{ matrix.cargo-lambda-flags }}

      - name: Package layer zip
        run: |
          mkdir -p staging/extensions
          cp target/lambda/extensions/lambda-otel-relay staging/extensions/
          cd staging
          zip -r ../lambda-otel-relay-${{ matrix.arch }}.zip extensions/

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: lambda-otel-relay-${{ matrix.arch }}.zip
          path: lambda-otel-relay-${{ matrix.arch }}.zip

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          prerelease_flag=""
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            lambda-otel-relay-arm64.zip \
            lambda-otel-relay-x86_64.zip \
            --generate-notes \
            --title "${{ github.ref_name }}" \
            $prerelease_flag
